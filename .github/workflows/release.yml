name: Release

# Cut a release by pushing a semver tag, e.g.:
#   git tag -a v1.2.3 -m "v1.2.3" && git push origin v1.2.3
#   (or: ./tools/release.ps1 1.2.3)
# The tag is the single source of truth for the version: it is stamped into the
# build and used to name the GitHub Release and the .exe.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # required to create the release and upload assets

env:
  GODOT_VERSION: "4.7"
  EXPORT_PRESET: "Windows Desktop"

jobs:
  build-windows:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"          # v1.2.3 -> 1.2.3
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing version $VERSION"

      - name: Install Godot ${{ env.GODOT_VERSION }} + export templates
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable"
          curl -fL -o godot.zip      "$BASE/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fL -o templates.tpz  "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          mkdir -p "$HOME/bin"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" "$HOME/bin/godot"
          chmod +x "$HOME/bin/godot"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          # Templates must land in <data>/godot/export_templates/<version>.stable/
          TPL_DIR="$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$TPL_DIR"
          unzip -q templates.tpz
          mv templates/* "$TPL_DIR/"

      - name: Stamp version & strip dev-only addons
        run: |
          set -euo pipefail
          # Stamp the tag into the project so the running game shows it.
          sed -i -E "s|^config/version=.*|config/version=\"${{ steps.ver.outputs.version }}\"|" project.godot
          # Editor plugins (GUT, MCP server) live under the gitignored addons/ and
          # are not in CI — disable them so the headless export doesn't error on them.
          sed -i -E "s|^enabled=PackedStringArray\(.*\)|enabled=PackedStringArray()|" project.godot
          # Tests depend on the GUT addon (GutTest) and must not ship; drop them
          # so the export's script compile pass doesn't choke on the missing class.
          rm -rf tests
          grep -E "^config/version=" project.godot

      - name: Import resources
        run: godot --headless --path . --import || true

      - name: Export Windows .exe
        run: |
          set -euo pipefail
          OUT="build/windows/spheres-of-pain-${{ steps.ver.outputs.version }}-windows.exe"
          mkdir -p build/windows
          godot --headless --path . --export-release "$EXPORT_PRESET" "$PWD/$OUT"
          ls -la build/windows
          test -s "$OUT"   # fail if the .exe is missing or empty
          echo "ASSET=$OUT" >> "$GITHUB_ENV"

      - name: Verify levels load from the exported data
        run: |
          set -euo pipefail
          # Export a PCK with the same preset (identical resource processing to the
          # .exe's embedded pack) and load every level from it headlessly. Fails the
          # build if any level is missing or invalid — this gate exists because 0.1.1
          # shipped with empty level layouts (the .tres -> binary .res conversion on
          # the Linux runner dropped LevelResource.layout) and nothing caught it.
          godot --headless --path . --export-pack "$EXPORT_PRESET" build/windows/verify.pck
          godot --headless --main-pack build/windows/verify.pck -s res://tools/verify_levels.gd
          rm -f build/windows/verify.pck

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Spheres of Pain ${{ github.ref_name }}"
          files: ${{ env.ASSET }}
          generate_release_notes: true
          fail_on_unmatched_files: true
